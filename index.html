<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class=" mt-5 flex items-center justify-center">

  <div class="bg-gray-100 rounded-xl shadow-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Registration Form</h1>

    <form id="regForm" novalidate>
      <!-- Name -->
      <div class="mb-4">
        <label for="name" class="block text-gray-900 mb-1">Name</label>
        <input
          type="text"
          id="name"
          class="w-full border border-gray-300 rounded px-3 py-2"
        >
        <p id="nameError" class="text-red-600 text-sm mt-1 hidden">Name is required</p>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block text-gray-900 mb-1">Email</label>
        <input
          type="email"
          id="email"
          class="w-full border border-gray-300 rounded px-3 py-2"
        >
        <p id="emailError" class="text-red-600 text-sm mt-1 hidden">Enter a valid email</p>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label for="password" class="block text-gray-900 mb-1">Password</label>
        <input
          type="password"
          id="password"
          class="w-full border border-gray-300 rounded px-3 py-2"
        >
        <p id="passwordError" class="text-red-600 text-sm mt-1 hidden">Password must be at least 6 characters</p>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        id="submitBtn"
        class="w-full py-2 rounded text-white font-medium bg-gray-500 cursor-not-allowed transition-colors"
        disabled
      >
        Register
      </button>
    </form>
  </div>

<script>
  const form = document.getElementById('regForm');
  const nameInput = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');

  const nameError = document.getElementById('nameError');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');

  const submitBtn = document.getElementById('submitBtn');

  function validateName() {
    const valid = nameInput.value.trim().length > 0;
    nameError.classList.toggle('hidden', valid);
    return valid;
  }

  function validateEmail() {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const valid = re.test(emailInput.value.trim());
    emailError.classList.toggle('hidden', valid);
    return valid;
  }

  function validatePassword() {
    const valid = passwordInput.value.length >= 6;
    passwordError.classList.toggle('hidden', valid);
    return valid;
  }

  function updateSubmitState() {
    const allValid =
      nameInput.value.trim().length > 0 &&
      /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim()) &&
      passwordInput.value.length >= 6;

    submitBtn.disabled = !allValid;
    submitBtn.classList.toggle('bg-gray-500', !allValid);
    submitBtn.classList.toggle('cursor-not-allowed', !allValid);
    submitBtn.classList.toggle('bg-blue-600', allValid);
    submitBtn.classList.toggle('hover:bg-blue-700', allValid);
    submitBtn.classList.toggle('cursor-pointer', allValid);
  }

  [nameInput, emailInput, passwordInput].forEach(input => {
    input.addEventListener('input', () => {
      validateName();
      validateEmail();
      validatePassword();
      updateSubmitState();
    });
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const nOk = validateName();
    const eOk = validateEmail();
    const pOk = validatePassword();
    updateSubmitState();

    if (nOk && eOk && pOk) {
      alert('Registered successfully!');
      form.reset();
      updateSubmitState();
    }
  });
</script>

</body>
</html>
